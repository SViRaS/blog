{{ range .Posts }}
<div class="post">
    {{ if .Image }}
    <img src="/{{ .Image }}" alt="{{ .Title }}" style="max-width: 100%; max-height: 300px; border-radius: 6px; margin-bottom: 15px;">
    {{ end }}
    
    <h3>{{ .Title }}</h3>
    <div class="post-meta">{{ .CreatedAt.Format "02.01.2006 15:04" }}</div>
    <p>{{ .Content }}</p>
    
    <div class="actions">
        <a href="/dashboard/post/{{ .ID }}/edit" class="btn btn-sm">✏️ Редактировать</a>
        <form action="/dashboard/post/{{ .ID }}/delete" method="POST" style="display:inline;" 
              onsubmit="return confirm('Удалить этот пост?');">
            <button type="submit" class="btn btn-sm btn-danger">🗑️ Удалить</button>
        </form>
    </div>
</div>
{{ end }}
