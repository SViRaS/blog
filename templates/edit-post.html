<form method="POST" action="/dashboard/post/{{ .Post.ID }}/edit" enctype="multipart/form-data">
    <input type="text" name="title" value="{{ .Post.Title }}" required maxlength="255">
    <textarea name="content" required>{{ .Post.Content }}</textarea>

    {{ if .Post.Image }}
    <div style="margin: 15px 0;">
        <p>Текущее изображение:</p>
        <img src="/{{ .Post.Image }}" alt="Current" style="max-width: 300px; border-radius: 6px;">
    </div>
    {{ end }}

    <div>
        <label for="image">Новое изображение (оставьте пустым, чтобы не менять):</label>
        <input type="file" name="image" id="image" accept="image/*">
    </div>
    
    <button type="submit">💾 Сохранить изменения</button>
</form>
