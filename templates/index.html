<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>{{ .Title }}</title>
</head>

<body>
    <header>
        <h1>{{ .Heading }}</h1>

        {{ if .CurrentUser }}
        <p>👤 <strong>{{ .CurrentUser.Username }}</strong></p>
        <form action="/logout" method="POST">
            <button type="submit">Выйти</button>
        </form>
        {{ else }}
        <p><a href="/login">Войти</a> | <a href="/register">Регистрация</a></p>
        {{ end }}
    </header>

    <main>
        <!-- <p>{{ .Content }}</p> -->
         <p>👤 <strong>"БЛОГИ"</strong></p>
          {{ range .Posts }}
        <div class="post">
            {{ if .Image }}
            <img src="/{{ .Image }}" alt="{{ .Title }}"
                style="max-width: 100%; max-height: 300px; border-radius: 6px; margin-bottom: 15px;">
            {{ end }}
            <h3>{{ .User.Username }}</h3>
            <h3>{{ .Title }}</h3>
            <div class="post-meta">{{ .CreatedAt.Format "02.01.2006 15:04" }}</div>
            <p>{{ .Content }}</p>
        </div>
        {{ end }}
    </main>
</body>
</html>
